server:
  port: 8084

spring:
  application:
    name: bff-service
  # Default profile uses H2 in-memory database for dev
  datasource:
    url: jdbc:h2:mem:devportal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always

services:
  dsl-engine:
    url: http://localhost:8081
  saas-controller:
    url: http://localhost:8082
  wrapper:
    url: http://localhost:8083

jwt:
  secret: dev-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm-requirements
  expiration-ms: 86400000
